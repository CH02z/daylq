<!doctype html>
<html lang="de" data-bs-theme="dark">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no"
		/>
		<meta name="theme-color" content="#0a0a0f" media="(prefers-color-scheme: dark)" />
		<meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="daylq" />
		<meta name="format-detection" content="telephone=no" />
		<link rel="apple-touch-icon" href="/favicon.svg" />
		<link rel="manifest" href="/manifest.json" />
		<script>
			// Theme aus Cookie lesen bevor Bootstrap lädt → kein Flash
			(function () {
				var m = document.cookie.match(/theme=([^;]+)/);
				document.documentElement.setAttribute('data-bs-theme', m ? m[1] : 'dark');
			})();
		</script>
		<link
			rel="preconnect"
			href="https://rsms.me/"
			crossorigin
		/>
		<link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
		/>
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
		/>
		<style>
			/* ───── Design tokens ───── */
			:root {
				--font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto,
					sans-serif;
				--font-display: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI',
					sans-serif;

				--brand-1: #6366f1; /* indigo */
				--brand-2: #8b5cf6; /* violet */
				--brand-3: #ec4899; /* pink */
				--brand-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 45%, #ec4899 100%);
				--brand-gradient-soft: linear-gradient(
					135deg,
					rgba(99, 102, 241, 0.18) 0%,
					rgba(139, 92, 246, 0.16) 45%,
					rgba(236, 72, 153, 0.14) 100%
				);
				--accent-green: #34d399;
				--accent-amber: #fbbf24;
				--accent-rose: #f43f5e;

				--ease-spring: cubic-bezier(0.32, 0.72, 0, 1);
				--ease-soft: cubic-bezier(0.4, 0, 0.2, 1);

				--radius-xs: 8px;
				--radius-sm: 12px;
				--radius-md: 16px;
				--radius-lg: 22px;
				--radius-xl: 28px;
				--radius-pill: 999px;

				--shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.06);
				--shadow-md: 0 8px 24px rgba(0, 0, 0, 0.08);
				--shadow-lg: 0 24px 60px rgba(0, 0, 0, 0.18);
				--shadow-brand: 0 10px 36px rgba(139, 92, 246, 0.35);
			}

			/* ───── Dark theme ───── */
			[data-bs-theme='dark'] {
				--bs-body-bg: #0a0a0f;
				--bs-body-color: #f5f5f7;
				--bs-secondary-color: rgba(235, 235, 245, 0.6);
				--bs-tertiary-color: rgba(235, 235, 245, 0.3);
				--bs-border-color: rgba(255, 255, 255, 0.08);
				--bs-card-bg: rgba(28, 28, 36, 0.72);
				--surface-1: rgba(28, 28, 36, 0.72);
				--surface-2: rgba(40, 40, 50, 0.6);
				--surface-3: rgba(255, 255, 255, 0.04);
				--surface-input: rgba(255, 255, 255, 0.05);
				--surface-input-focus: rgba(139, 92, 246, 0.08);
				--hairline: rgba(255, 255, 255, 0.07);
				--bg-mesh: radial-gradient(
						1200px 600px at 80% -10%,
						rgba(139, 92, 246, 0.18),
						transparent 60%
					),
					radial-gradient(900px 500px at 0% 30%, rgba(99, 102, 241, 0.14), transparent 55%),
					radial-gradient(900px 600px at 50% 110%, rgba(236, 72, 153, 0.12), transparent 60%);
			}

			/* ───── Light theme ───── */
			[data-bs-theme='light'] {
				--bs-body-bg: #f5f5f7;
				--bs-body-color: #1d1d1f;
				--bs-secondary-color: #6e6e73;
				--bs-tertiary-color: #a1a1a6;
				--bs-border-color: rgba(0, 0, 0, 0.06);
				--bs-card-bg: rgba(255, 255, 255, 0.85);
				--surface-1: rgba(255, 255, 255, 0.92);
				--surface-2: rgba(255, 255, 255, 0.7);
				--surface-3: rgba(0, 0, 0, 0.03);
				--surface-input: rgba(0, 0, 0, 0.04);
				--surface-input-focus: rgba(139, 92, 246, 0.06);
				--hairline: rgba(0, 0, 0, 0.06);
				--bg-mesh: radial-gradient(
						1200px 600px at 80% -10%,
						rgba(139, 92, 246, 0.12),
						transparent 60%
					),
					radial-gradient(900px 500px at 0% 30%, rgba(99, 102, 241, 0.1), transparent 55%),
					radial-gradient(900px 600px at 50% 110%, rgba(236, 72, 153, 0.08), transparent 60%);
			}

			/* ───── Base ───── */
			* {
				-webkit-tap-highlight-color: transparent;
				-webkit-touch-callout: none;
			}
			html {
				background: var(--bs-body-bg);
				-webkit-text-size-adjust: 100%;
				text-size-adjust: 100%;
				overscroll-behavior-y: contain;
			}
			html, body { background: var(--bs-body-bg); }
			body {
				font-family: var(--font-sans);
				font-feature-settings: 'cv11', 'ss01', 'ss03';
				-webkit-font-smoothing: antialiased;
				-moz-osx-font-smoothing: grayscale;
				-webkit-text-size-adjust: 100%;
				background: var(--bs-body-bg);
				background-image: var(--bg-mesh);
				background-attachment: fixed;
				min-height: 100vh;
				min-height: 100dvh;
				padding-bottom: env(safe-area-inset-bottom);
				letter-spacing: -0.011em;
				touch-action: manipulation;
				overscroll-behavior-y: contain;
			}
			/* Allow text selection in inputs/textarea only */
			input, textarea, [contenteditable] {
				-webkit-user-select: text;
				user-select: text;
				-webkit-touch-callout: default;
			}
			/* Disable hover effects on touch devices to prevent sticky-hover */
			@media (hover: none) {
				.btn:hover,
				button:hover,
				a:hover { filter: none !important; }
			}
			/* Smooth scrolling for anchor jumps */
			html { scroll-behavior: smooth; }
			@media (prefers-reduced-motion: reduce) {
				html { scroll-behavior: auto; }
				*, *::before, *::after {
					animation-duration: 0.001ms !important;
					transition-duration: 0.001ms !important;
				}
			}
			@supports (font-variation-settings: normal) {
				body { font-family: 'Inter var', var(--font-sans); }
			}

			/* Headlines: tighter tracking, display feel */
			h1, h2, h3, .display-1, .display-2, .display-3, .display-4 {
				font-family: var(--font-display);
				letter-spacing: -0.03em;
				font-weight: 700;
			}
			h4, h5 { letter-spacing: -0.02em; font-weight: 700; }

			/* iOS auto-zoom prevention */
			.form-control, .form-control-sm,
			input[type='text'], input[type='email'],
			input[type='password'], input[type='search'],
			input[type='time'], textarea {
				font-size: max(1rem, 16px) !important;
			}

			/* ───── Bootstrap overrides ───── */
			.btn {
				min-height: 44px;
				font-weight: 600;
				border-radius: var(--radius-pill);
				padding-inline: 1.25rem;
				transition:
					transform 0.18s var(--ease-spring),
					background 0.18s var(--ease-soft),
					box-shadow 0.18s var(--ease-soft),
					border-color 0.18s var(--ease-soft);
				border: 1px solid transparent;
			}
			.btn:active { transform: scale(0.97); }
			.btn-sm { min-height: 36px; padding-inline: 0.9rem; font-size: 0.85rem; }
			.btn-lg { min-height: 52px; padding-inline: 1.75rem; font-size: 1rem; }

			.btn-primary {
				background: var(--brand-gradient);
				border-color: transparent;
				color: #fff !important;
				box-shadow: var(--shadow-brand);
			}
			.btn-primary:hover, .btn-primary:focus {
				background: var(--brand-gradient);
				filter: brightness(1.08);
				color: #fff !important;
				box-shadow: 0 14px 40px rgba(139, 92, 246, 0.45);
			}
			.btn-primary:disabled {
				background: var(--brand-gradient);
				opacity: 0.55;
				box-shadow: none;
			}

			.btn-outline-primary {
				color: var(--brand-2);
				border-color: var(--hairline);
				background: var(--surface-3);
			}
			.btn-outline-primary:hover {
				background: var(--brand-gradient-soft);
				border-color: rgba(139, 92, 246, 0.4);
				color: var(--bs-body-color);
			}
			.btn-outline-secondary {
				color: var(--bs-body-color);
				border-color: var(--hairline);
				background: var(--surface-3);
			}
			.btn-outline-secondary:hover {
				background: var(--surface-2);
				color: var(--bs-body-color);
				border-color: var(--hairline);
			}
			.btn-outline-danger {
				color: var(--accent-rose);
				border-color: rgba(244, 63, 94, 0.3);
				background: rgba(244, 63, 94, 0.06);
			}
			.btn-outline-danger:hover {
				background: rgba(244, 63, 94, 0.12);
				color: var(--accent-rose);
				border-color: rgba(244, 63, 94, 0.5);
			}
			.btn-danger {
				background: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
				border: none;
				color: #fff;
				box-shadow: 0 10px 28px rgba(244, 63, 94, 0.35);
			}
			.btn-light {
				background: #fff;
				color: #1d1d1f;
				border: none;
			}

			.text-primary, a.text-primary { color: var(--brand-2) !important; }

			.form-control, .form-select {
				background: var(--surface-input);
				border: 1px solid var(--hairline);
				color: var(--bs-body-color);
				border-radius: var(--radius-sm);
				padding: 0.75rem 1rem;
				transition:
					border-color 0.18s var(--ease-soft),
					background 0.18s var(--ease-soft),
					box-shadow 0.18s var(--ease-soft);
			}
			.form-control:focus, .form-select:focus {
				background: var(--surface-input-focus);
				border-color: rgba(139, 92, 246, 0.55);
				box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.18);
				color: var(--bs-body-color);
				outline: none;
			}
			.form-control::placeholder {
				color: var(--bs-tertiary-color);
			}

			.card {
				background: var(--bs-card-bg);
				border: 1px solid var(--hairline);
				border-radius: var(--radius-lg);
				backdrop-filter: blur(24px) saturate(180%);
				-webkit-backdrop-filter: blur(24px) saturate(180%);
			}

			.alert-danger {
				background: rgba(244, 63, 94, 0.1);
				color: var(--accent-rose);
				border: 1px solid rgba(244, 63, 94, 0.25);
				border-radius: var(--radius-sm);
			}

			hr { border-color: var(--hairline); opacity: 1; }

			::selection {
				background: rgba(139, 92, 246, 0.35);
				color: inherit;
			}

			/* ───── Surfaces used app-wide ───── */
			.glass {
				background: var(--surface-1);
				border: 1px solid var(--hairline);
				border-radius: var(--radius-lg);
				backdrop-filter: blur(24px) saturate(180%);
				-webkit-backdrop-filter: blur(24px) saturate(180%);
			}
			.glass-soft {
				background: var(--surface-3);
				border: 1px solid var(--hairline);
				border-radius: var(--radius-md);
			}

			.eyebrow {
				font-size: 0.7rem;
				font-weight: 700;
				letter-spacing: 0.12em;
				text-transform: uppercase;
				color: var(--bs-secondary-color);
			}

			.gradient-text {
				background: var(--brand-gradient);
				-webkit-background-clip: text;
				background-clip: text;
				color: transparent;
				-webkit-text-fill-color: transparent;
			}

			.app-container {
				width: 100%;
				max-width: 1140px;
				margin-inline: auto;
				padding-inline: max(1rem, env(safe-area-inset-left));
				padding-right: max(1rem, env(safe-area-inset-right));
			}

			/* Page padding accounting for fixed bottom nav on mobile */
			.page-pad-bottom {
				padding-bottom: max(110px, calc(86px + env(safe-area-inset-bottom)));
			}
			@media (min-width: 992px) {
				.page-pad-bottom { padding-bottom: 4rem; }
			}

			/* Mobile-only typography scale + spacing */
			@media (max-width: 640px) {
				h1, h2, .display-1, .display-2, .display-3, .display-4 {
					letter-spacing: -0.035em;
				}
				/* Bigger buttons on touch */
				.btn { min-height: 48px; padding-inline: 1.3rem; }
				.btn-sm { min-height: 40px; }
				.btn-lg { min-height: 56px; }

				/* Bigger pill targets on mobile */
				.goal-pill, .qt-pill, .cat-chip, .filter-chip {
					min-height: 38px;
					padding-block: 9px !important;
					padding-inline: 14px !important;
					font-size: 0.85rem !important;
				}
				.swatch { width: 36px !important; height: 36px !important; }
				.icon-btn-app, .swatch { min-width: 36px; }

				/* More breathing room in cards */
				.app-container {
					padding-inline: max(1rem, env(safe-area-inset-left));
					padding-right: max(1rem, env(safe-area-inset-right));
				}
			}

			/* Scrollbar polish */
			*::-webkit-scrollbar { width: 8px; height: 8px; }
			*::-webkit-scrollbar-track { background: transparent; }
			*::-webkit-scrollbar-thumb {
				background: var(--hairline);
				border-radius: 4px;
			}
			*::-webkit-scrollbar-thumb:hover { background: rgba(139, 92, 246, 0.4); }

			/* Animation utility */
			@keyframes fadeUp {
				from { opacity: 0; transform: translateY(8px); }
				to { opacity: 1; transform: translateY(0); }
			}
			.fade-up { animation: fadeUp 0.6s var(--ease-spring) both; }

			@keyframes pulse-ring {
				0% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.45); }
				100% { box-shadow: 0 0 0 12px rgba(139, 92, 246, 0); }
			}

			@keyframes shimmer {
				0% { background-position: -200% 0; }
				100% { background-position: 200% 0; }
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
		></script>
	</body>
</html>
